<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pizza Co.</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #fcf8f2; color: #333; }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #d9534f; }
        .pizza-menu { margin: 20px 0; font-size: 1.2rem; }
        .status-box { background-color: #e2f0d9; padding: 15px; border-radius: 5px; margin-top: 30px; font-weight: bold; color: #385723; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍕 DevOps Pizza Co. 🍕</h1>
        <p>Where code is hot, and delivery is continuous!</p>
        
        <div class="pizza-menu">
            <p><strong>1. Pepperoni Automata</strong> - $12</p>
            <p><strong>2. Containerized Cheese</strong> - $10</p>
            <p><strong>3. Infrastructure Veggie</strong> - $13</p>
        </div>

        <div class="status-box">
            Order Status: 🚚 Your driver is 2 minutes away! (GPS Tracking Enabled)
        </div>
    </div>

</body>
</html>
